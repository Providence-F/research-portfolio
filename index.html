  <style>
:root {
  --bg: #faf9f7;
  --bg-2: #f5f4f0;
  --surface: #ffffff;
  --ink: #111110;
  --ink-2: #4a4a46;
  --ink-3: #8a8984;
  --rule: #e8e6e1;
  --rule-2: #d4d2cc;
  --accent: #d97757;
  --accent-hover: #c56a4d;
  --accent-soft: #f3e9e4;
  --green: #788c5d;
  --radius: 14px;
  --radius-sm: 8px;
  --shadow: 0 1px 2px rgba(17,17,16,0.04), 0 8px 24px rgba(17,17,16,0.06);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Lora', Georgia, 'Times New Roman', serif;
  background: var(--bg);
  color: var(--ink);
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
}
.sans { font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }

/* Header */
header {
  background: var(--surface);
  border-bottom: 1px solid var(--rule);
  padding: 96px 24px 72px;
  text-align: center;
}
header h1 {
  font-family: 'Inter', sans-serif;
  font-size: clamp(2.4rem, 6vw, 3.6rem);
  font-weight: 600;
  letter-spacing: -0.03em;
  line-height: 1.1;
  margin-bottom: 20px;
  color: var(--ink);
}
header .subtitle {
  font-size: 1.15rem;
  color: var(--ink-2);
  max-width: 620px;
  margin: 0 auto 32px;
}
header .meta {
  display: inline-flex;
  gap: 6px;
  align-items: center;
  font-family: 'Inter', sans-serif;
  font-size: 0.85rem;
  color: var(--ink-3);
  background: var(--bg-2);
  padding: 8px 16px;
  border-radius: 999px;
  border: 1px solid var(--rule);
}

/* Container */
.container { max-width: 1120px; margin: 0 auto; padding: 56px 24px 96px; }

/* Stats */
.stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 16px;
  margin-bottom: 48px;
}
.stat {
  background: var(--surface);
  border: 1px solid var(--rule);
  border-radius: var(--radius-sm);
  padding: 24px;
  text-align: center;
  box-shadow: var(--shadow);
}
.stat .number {
  font-family: 'Inter', sans-serif;
  font-size: 2.2rem;
  font-weight: 600;
  color: var(--accent);
  line-height: 1;
}
.stat .label {
  font-family: 'Inter', sans-serif;
  font-size: 0.85rem;
  color: var(--ink-3);
  margin-top: 8px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}

/* Controls */
.controls {
  display: flex;
  flex-direction: column;
  gap: 18px;
  margin-bottom: 40px;
}
.search-wrap { position: relative; }
.search-icon {
  position: absolute;
  left: 16px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--ink-3);
  font-size: 1rem;
}
#search {
  width: 100%;
  padding: 14px 16px 14px 44px;
  font-family: 'Inter', sans-serif;
  font-size: 0.95rem;
  color: var(--ink);
  background: var(--surface);
  border: 1px solid var(--rule-2);
  border-radius: var(--radius-sm);
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
}
#search:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px var(--accent-soft);
}
#search::placeholder { color: var(--ink-3); }

.filters {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
}
.filter {
  font-family: 'Inter', sans-serif;
  font-size: 0.85rem;
  font-weight: 500;
  color: var(--ink-2);
  background: transparent;
  border: 1px solid var(--rule-2);
  padding: 8px 16px;
  border-radius: 999px;
  cursor: pointer;
  transition: all 0.18s ease;
}
.filter:hover { border-color: var(--ink-3); color: var(--ink); }
.filter.active {
  background: var(--ink);
  color: var(--bg);
  border-color: var(--ink);
}

/* Section titles */
.section-title {
  font-family: 'Inter', sans-serif;
  font-size: 1.15rem;
  font-weight: 600;
  color: var(--ink);
  margin: 48px 0 20px;
  padding-bottom: 10px;
  border-bottom: 1px solid var(--rule);
  display: flex;
  justify-content: space-between;
  align-items: baseline;
}
.section-title .count {
  font-size: 0.8rem;
  font-weight: 500;
  color: var(--ink-3);
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

/* Grid */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
  gap: 20px;
}
.card {
  background: var(--surface);
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  padding: 26px;
  cursor: pointer;
  transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
  display: flex;
  flex-direction: column;
  height: 100%;
}
.card:hover {
  transform: translateY(-3px);
  box-shadow: var(--shadow);
  border-color: var(--rule-2);
}
.card .category {
  font-family: 'Inter', sans-serif;
  font-size: 0.7rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--accent);
  margin-bottom: 12px;
}
.card h3 {
  font-family: 'Inter', sans-serif;
  font-size: 1.05rem;
  font-weight: 600;
  line-height: 1.35;
  margin-bottom: 12px;
  color: var(--ink);
}
.card .summary {
  font-size: 0.92rem;
  color: var(--ink-2);
  line-height: 1.55;
  flex: 1;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card .footer-meta {
  margin-top: 18px;
  padding-top: 14px;
  border-top: 1px solid var(--rule);
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-family: 'Inter', sans-serif;
  font-size: 0.78rem;
  color: var(--ink-3);
}
.card .read {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  color: var(--accent);
  font-weight: 600;
  transition: gap 0.2s;
}
.card:hover .read { gap: 8px; }

.empty {
  text-align: center;
  padding: 80px 20px;
  color: var(--ink-3);
  font-family: 'Inter', sans-serif;
  font-size: 0.95rem;
}

/* Modal */
.overlay {
  position: fixed;
  inset: 0;
  background: rgba(17,17,16,0.55);
  backdrop-filter: blur(4px);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 100;
  padding: 24px;
}
.overlay.active { display: flex; }
.modal {
  background: var(--surface);
  border: 1px solid var(--rule);
  border-radius: var(--radius);
  width: 100%;
  max-width: 880px;
  max-height: 86vh;
  display: flex;
  flex-direction: column;
  box-shadow: 0 24px 60px rgba(17,17,16,0.18);
}
.modal-header {
  padding: 20px 24px;
  border-bottom: 1px solid var(--rule);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 16px;
}
.modal-header h2 {
  font-family: 'Inter', sans-serif;
  font-size: 1.15rem;
  font-weight: 600;
  line-height: 1.35;
}
.modal-header button {
  background: transparent;
  border: none;
  color: var(--ink-3);
  font-size: 1.6rem;
  cursor: pointer;
  line-height: 1;
  padding: 4px;
  transition: color 0.2s;
}
.modal-header button:hover { color: var(--ink); }
.modal-body {
  padding: 28px 32px;
  overflow-y: auto;
  font-size: 0.95rem;
  line-height: 1.75;
  color: var(--ink-2);
  white-space: pre-wrap;
  word-break: break-word;
}
.modal-body.loading { font-style: italic; color: var(--ink-3); }

/* Footer */
footer {
  text-align: center;
  padding: 48px 24px;
  border-top: 1px solid var(--rule);
  color: var(--ink-3);
  font-family: 'Inter', sans-serif;
  font-size: 0.85rem;
}
footer a { color: var(--ink-2); text-decoration: none; border-bottom: 1px solid var(--rule-2); }
footer a:hover { color: var(--accent); border-color: var(--accent); }

@media (max-width: 640px) {
  .stats { grid-template-columns: 1fr; }
  .grid { grid-template-columns: 1fr; }
  header { padding: 64px 20px 48px; }
  .container { padding: 36px 20px 64px; }
}
</style>
</head>

    const contentEl = document.getElementById('content');
    const emptyEl = document.getElementById('empty');
    const searchInput = document.getElementById('search');
    const filterBtns = document.querySelectorAll('.filter');
    let currentCategory = 'all';

    function escapeHtml(s) {
      return s.replace(/[&<>"']/g, c =>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    }

    function render() {
      const q = searchInput.value.trim().toLowerCase();
      const filtered = reports.filter(r => {
        const matchCat = currentCategory === 'all' || r.category === currentCategory;
        const matchQ = !q || r.title.toLowerCase().includes(q) || (r.summary || '').toLowerCase().includes(q);
        return matchCat && matchQ;
      });

      if (filtered.length === 0) {
        contentEl.innerHTML = '';
        emptyEl.style.display = 'block';
        return;
      }
      emptyEl.style.display = 'none';

      // 按分类分组
      const groups = {};
      for (const r of filtered) {
        groups[r.category] = groups[r.category] || [];
        groups[r.category].push(r);
      }

      let html = '';
      for (const cat of ["项目研究", "收件箱研究"]) {
        const items = groups[cat];
        if (!items) continue;
        html += `<h2 class="section-title"><span>${escapeHtml(cat)}</span><span class="count">${items.length} 份</span></h2>`;
        html += '<div class="grid">';
        for (const r of items) {
          const safeTitle = escapeHtml(r.title).replace(/'/g, "&#39;");
          html += '<article class="card" onclick="openReport('' + encodeURIComponent(r.file) + '', '' + safeTitle + '')">' +
            '<div class="category">' + escapeHtml(r.category) + '</div>' +
            '<h3>' + escapeHtml(r.title) + '</h3>' +
            '<p class="summary">' + escapeHtml((r.display_summary || r.summary || '').slice(0, 220)) + '</p>' +
            '<div class="footer-meta">' +
              '<span>' + r.word_count.toLocaleString() + ' 字</span>' +
              '<span class="read">阅读全文 →</span>' +
            '</div>' +
          '</article>';
        }
        html += '</div>';
      }
      contentEl.innerHTML = html;
    }

    filterBtns.forEach(btn => {
      btn.addEventListener('click', () => {
        filterBtns.forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentCategory = btn.dataset.category;
        render();
      });
    });

    searchInput.addEventListener('input', render);

    async function openReport(file, title) {
      document.getElementById('modalTitle').textContent = title;
      const body = document.getElementById('modalBody');
      body.className = 'modal-body loading';
      body.textContent = '正在加载原文…';
      document.getElementById('overlay').classList.add('active');
      try {
        const res = await fetch('reports/' + file);
        if (!res.ok) throw new Error('加载失败');
        const text = await res.text();
        body.className = 'modal-body';
        body.textContent = text;
      } catch (e) {
        body.className = 'modal-body';
        body.textContent = '加载失败，请稍后刷新页面重试。';
      }
    }

    function closeModal() {
      document.getElementById('overlay').classList.remove('active');
    }

    document.getElementById('overlay').addEventListener('click', e => {
      if (e.target.id === 'overlay') closeModal();
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeModal();
    });

    render();
  </script>
